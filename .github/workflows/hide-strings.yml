# Example workflow for CONTENT repositories (not this tool repo).
#
# Hides structural markers from translators in Crowdin. The list of markers is
# generated by NTTT from its marker registry (markers.yml), covering both the
# legacy (--- task ---) and RFM (> [!TASK]) syntaxes. This replaces the previous
# hand-written grep/awk/sed pipeline.
#
# Copy this into the content repo's .github/workflows/ directory.

name: Crowdin Hide Strings

on:
  workflow_run:
    workflows: ["Crowdin Upload Action"]
    types:
      - completed

jobs:
  crowdin-hide:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install NTTT
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/raspberrypilearning/nttt.git

      - name: Install Crowdin CLI
        run: |
          curl -L https://github.com/crowdin/crowdin-cli/releases/latest/download/crowdin-cli.zip -o crowdin-cli.zip
          unzip crowdin-cli.zip -d crowdin-cli
          mkdir -p ~/bin
          mv crowdin-cli/*/crowdin ~/bin/crowdin
          cp crowdin-cli/*/crowdin-cli.jar ~/bin/crowdin-cli.jar
          chmod +x ~/bin/crowdin
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Hide matching strings
        run: |
          set -euo pipefail
          crowdin --version
          # NTTT reads the Crowdin listing and prints the IDs of strings to hide
          # (those containing a marker from markers.yml, legacy or RFM).
          crowdin string list --verbose --no-progress | nttt --hide-strings > ids.txt
          count=$(grep -c . ids.txt || true)
          echo "Hiding $count strings"
          if [[ "$count" -eq 0 ]]; then
            echo "No strings to hide"
            exit 0
          fi
          # Batch hide via API — much faster than one `crowdin string edit` per ID.
          batch_size=100
          batch=()
          hidden=0
          hide_batch() {
            local patch http_code batch_count
            patch=$(printf '%s\n' "${batch[@]}" | jq -R 'select(length > 0) | {op: "replace", path: ("/" + . + "/isHidden"), value: true}' | jq -s '.')
            http_code=$(curl -sS -o /tmp/crowdin-hide-response.json -w "%{http_code}" \
              -X PATCH "https://api.crowdin.com/api/v2/projects/${CROWDIN_PROJECT_ID}/strings" \
              -H "Authorization: Bearer ${CROWDIN_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$patch")
            if [[ "$http_code" -ge 300 ]]; then
              echo "Batch hide failed (HTTP $http_code):"
              cat /tmp/crowdin-hide-response.json
              exit 1
            fi
            batch_count=${#batch[@]}
            hidden=$((hidden + batch_count))
            echo "Hid $hidden / $count strings"
            batch=()
          }
          while read -r id; do
            [[ -z "$id" ]] && continue
            batch+=("$id")
            if ((${#batch[@]} >= batch_size)); then
              hide_batch
            fi
          done < ids.txt
          if ((${#batch[@]} > 0)); then
            hide_batch
          fi
          echo "Done — hid $hidden strings"
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_API_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}